<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Lana — Store</title>

    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>

    <script>
      Paddle.Initialize({
        token: "live_a548aa7068012eceacdb32fb6ec",
      });
    </script>

    <style>
      :root {
        --bg: #f5f5f3;
        --card: #ffffff;
        --text: #181816;
        --muted: #777;
        --green: #2f7a5c;
        --border: #ddd;

        --mono: "SFMono-Regular", Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;

        background: var(--bg);

        color: var(--text);

        font-family: var(--mono);
      }

      .grid {
        position: fixed;

        inset: 0;

        background-image:
          linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);

        background-size: 32px 32px;

        z-index: -1;
      }

      .container {
        max-width: 900px;

        margin: auto;

        padding: 50px 20px;
      }

      nav {
        display: flex;

        justify-content: space-between;

        margin-bottom: 60px;

        font-size: 0.8rem;
      }

      nav a {
        color: var(--muted);

        text-decoration: none;

        transition: 0.2s;
      }

      nav a:hover {
        color: var(--green);
      }

      h1 {
        font-size: 1.2rem;

        font-weight: 400;

        margin-bottom: 40px;
      }

      .products {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));

        gap: 20px;
      }

      .card {
        background: var(--card);

        border: 1px solid var(--border);

        border-radius: 16px;

        padding: 25px;

        transition: 0.25s;

        animation: show 0.5s ease both;
      }

      .card:nth-child(2) {
        animation-delay: 0.1s;
      }

      .card:nth-child(3) {
        animation-delay: 0.2s;
      }

      @keyframes show {
        from {
          opacity: 0;

          transform: translateY(15px);
        }

        to {
          opacity: 1;

          transform: none;
        }
      }

      .card:hover {
        transform: translateY(-5px);

        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
      }

      .tag {
        font-size: 0.65rem;

        color: var(--green);

        margin-bottom: 20px;
      }

      .card h2 {
        font-size: 1rem;

        font-weight: 400;

        margin: 0 0 10px;
      }

      .card p {
        font-size: 0.75rem;

        color: var(--muted);

        line-height: 1.7;
      }

      .price {
        margin-top: 25px;

        font-size: 1.2rem;
      }

      button {
        margin-top: 20px;

        width: 100%;

        padding: 12px;

        background: var(--green);

        color: white;

        border: 0;

        border-radius: 10px;

        font-family: var(--mono);

        cursor: pointer;

        transition: 0.2s;
      }

      button:hover {
        opacity: 0.85;

        transform: translateY(-2px);
      }

      footer {
        margin-top: 80px;

        text-align: center;

        font-size: 0.7rem;

        color: var(--muted);
      }

      @media (max-width: 600px) {
        .container {
          padding: 35px 15px;
        }

        nav {
          margin-bottom: 40px;
        }
      }
    </style>
  </head>

  <body>
    <div class="grid"></div>

    <div class="container">
      <nav>
        <a href="../"> lana/ </a>

        <a href="../"> home </a>
      </nav>

      <h1>$ store</h1>

      <div class="products">
        <div class="card">
          <div class="tag">DIGITAL</div>

          <h2>Star Cursor</h2>

          <p>Minimal cursor for your desktop.</p>

          <div class="price">$9.99</div>

          <button onclick="buy('star_cursor')">buy →</button>
        </div>
      </div>

      <footer>© 2026 Lana</footer>
    </div>

    <script>
      const products = {
        star_cursor: "pri_01ky02brqnej8c3w9j100yd44t",

        toolkit: "pri_xxxxx",

        ui: "pri_xxxxx",
      };

      function buy(product) {
        Paddle.Checkout.open({
          items: [
            {
              priceId: products[product],

              quantity: 1,
            },
          ],
        });
      }
    </script>
  </body>
</html>
